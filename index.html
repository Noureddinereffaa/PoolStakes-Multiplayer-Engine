<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#020617" />
    <meta name="msapplication-navbutton-color" content="#020617" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="8-Ball Pool" />
    <meta name="application-name" content="8-Ball Pool" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="x5-orientation" content="landscape" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="x5-page-mode" content="app" />
    <meta name="browsermode" content="application" />
    <meta name="full-screen" content="yes" />
    <meta name="handheldfriendly" content="true" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png" media="(orientation: landscape)" />
    <meta name="apple-itunes-app" content="app-id=my-app-id" />
    <title>8-Ball Pool - Multiplayer</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        document.documentElement.classList.add('pwa-mode');
      }
    </script>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #020617; overflow-x: hidden; }
      html.pwa-mode { overscroll-behavior: none; -webkit-overflow-scrolling: touch; }
      body { -webkit-user-select: none; user-select: none; }
      * { -webkit-tap-highlight-color: transparent; }
      /* عند الدخول في وضع اللعب فقط، ArenaPage يضبط overflow:hidden; position:fixed عبر JS */
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
