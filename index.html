<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Swallow Vite / HMR websocket connection errors/rejections gracefully to preserve clean execution
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.indexOf('vite') !== -1 || e.message.indexOf('WebSocket') !== -1 || e.message.indexOf('websocket') !== -1)) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        const reason = e.reason && (e.reason.message || e.reason.toString() || '');
        if (reason && (reason.indexOf('WebSocket') !== -1 || reason.indexOf('websocket') !== -1 || reason.indexOf('vite') !== -1)) {
          e.preventDefault();
          e.stopPropagation();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
