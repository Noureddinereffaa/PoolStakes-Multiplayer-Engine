services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - DATABASE_URL=${DATABASE_URL:-file:./dev.db}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=3000
      - HOST=0.0.0.0
    volumes:
      - db_data:/app/prisma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db_data:
